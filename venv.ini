# Configuración runtime — U&F
# Formato: clave=valor
# Única fuente de verdad para opciones modificables en ejecución.

# --- Logging (0=off, 1=resumen, 2=detalle) ---
LOG_CONFIG_LEVEL=1
LOG_LOG_LEVEL=1
LOG_WORLD_LEVEL=1
LOG_WORLD_GEN_LEVEL=1
LOG_CAMERA_LEVEL=1
LOG_NPC_LEVEL=1
LOG_APPEARANCE_LEVEL=1
LOG_ATTRIBUTES_LEVEL=1
LOG_GUI_LEVEL=1

# --- World / map ---
# Visual height in pixels per z step (MapHeightField).
WORLD_HEIGHT_STEP=8
# Isometric tile size in pixels (width x height); kept in sync with the placeholder TileSet.
WORLD_TILE_WIDTH=64
WORLD_TILE_HEIGHT=32

# --- World generation defaults ---
WORLD_GEN_DEFAULT_SEED=1000

# --- NPC animation / grid movement ---
NPC_SPRITE_FRAME_SIZE=64
# Normalized Y (0=top, 1=bottom) where feet touch the ground in each sprite frame.
NPC_FEET_ANCHOR_Y=0.8
NPC_WALK_FPS=8
NPC_STEP_DURATION=0.15
NPC_STEP_REPEAT=0.18

# --- Camera ---
# Pixels of rig movement per pixel of mouse drag while middle button is held.
CAMERA_MOUSE_PAN_SENSITIVITY=1.0

# --- GUI ---
# Default minimum size (px) applied to newly built UfPanel instances.
GUI_DEFAULT_PANEL_WIDTH=280
GUI_DEFAULT_PANEL_HEIGHT=200

# ---------------------------------------------------------------------------------
# --- Game window placement (runtime only; ignored in editor) ---
# Move/resize the game window on startup (e.g. MCP run_project out of the way).
GAME_WINDOW_PLACEMENT_ENABLED=true
# bottom_right | bottom_left | top_right | top_left | absolute
GAME_WINDOW_PLACEMENT_CORNER=bottom_left
GAME_WINDOW_WIDTH=1080
GAME_WINDOW_HEIGHT=1080
# Pixels inset from screen edges; taskbar_margin extra on bottom corners.
GAME_WINDOW_MARGIN=8
GAME_WINDOW_TASKBAR_MARGIN=48
# Used only when GAME_WINDOW_PLACEMENT_CORNER=absolute (-1 = use corner mode).
GAME_WINDOW_X=-1
GAME_WINDOW_Y=-1
